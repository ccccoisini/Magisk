name: Magisk armv8 Release Build

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "native/**"
      - "build.py"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build arm64-v8a release
    runs-on: macos-26

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          is-asset-build: true

      - name: Patch package name
        run: |
          python3 - <<'PY'
          from pathlib import Path

          old = "com.topjohnwu.magisk"
          new = "com.games.lucky"

          patches = {
              "app/build-logic/src/main/java/Setup.kt": [
                  (f'applicationId = "{old}"', f'applicationId = "{new}"'),
              ],
              "app/core/build.gradle.kts": [
                  (f'buildConfigField("String", "APP_PACKAGE_NAME", "\\"{old}\\"")',
                   f'buildConfigField("String", "APP_PACKAGE_NAME", "\\"{new}\\"")'),
              ],
              "app/stub/build.gradle.kts": [
                  (f'applicationId = "{old}"', f'applicationId = "{new}"'),
              ],
          }

          for file, reps in patches.items():
              p = Path(file)
              s = p.read_text()
              for a, b in reps:
                  if a not in s:
                      raise SystemExit(f"Missing pattern in {file}: {a}")
                  s = s.replace(a, b)
              p.write_text(s)

          print("Patched package name to com.games.lucky")
          PY

      - name: Create arm64-v8a release config
        run: |
          cat > .github/armv8-release.prop <<'EOF'
          abiList=arm64-v8a
          outdir=out
          EOF

      - name: Build native arm64-v8a release
        run: ./build.py -vr -c .github/armv8-release.prop native

      - name: Build Magisk app release
        run: ./build.py -vr -c .github/armv8-release.prop app

      - name: Stop gradle daemon
        if: always()
        run: ./app/gradlew --stop

      - name: Upload armv8 release artifact
        uses: actions/upload-artifact@v7
        with:
          name: magisk-arm64-v8a-release-${{ github.sha }}
          path: |
            out/app-release.apk
            out/stub-release.apk
            out/*
          compression-level: 9
